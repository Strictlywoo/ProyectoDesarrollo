<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>AlToque - Menú</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/css/styles.css">

        <style>

            .producto-card{
                position: relative;
                overflow: hidden;
                cursor: pointer;
            }

            .producto-card img{
                height: 250px;
                width: 100%;
                object-fit: cover;
            }

            .producto-info{
                position: absolute;
                bottom: 0;
                background: rgba(0,0,0,0.7);
                color: white;
                width: 100%;
                transform: translateY(100%);
                transition: 0.3s;
                padding: 10px;
            }

            .producto-card:hover .producto-info{
                transform: translateY(0);
            }

            .carrito-icon{
                font-size: 22px;
            }

            .contador{
                background: red;
                color: white;
                border-radius: 50%;
                padding: 3px 8px;
                font-size: 12px;
                margin-left: 5px;
            }

        </style>

    </head>

    <body>

        <nav class="navbar navbar-dark bg-dark px-4">
        <a class="navbar-brand logo" href="/">AlToque</a>

            <a href="/carrito" class="text-white carrito-icon">

                🛒
                <span class="contador" th:text="${contador}">0</span>

            </a>

        </nav>

        <div class="container mt-4">

            <h2 class="mb-4">Menú del Restaurante</h2>

            <div class="row">

                <div class="col-md-3 mb-4" th:each="p : ${productos}">

                    <div class="card producto-card">

                        <img th:src="@{/img/{img}(img=${p.imagen})}" class="card-img-top">

                        <div class="producto-info">

                            <h5 th:text="${p.nombre}"></h5>

                            <p th:text="${p.descripcion}"></p>

                            <p>₡<span th:text="${p.precio}"></span></p>

                            <form action="/agregar" method="post">

                                <input type="hidden" name="id" th:value="${p.id}">
                                <input type="hidden" name="nombre" th:value="${p.nombre}">
                                <input type="hidden" name="precio" th:value="${p.precio}">

                                <input type="number"
                                       name="cantidad"
                                       class="form-control mb-2"
                                       value="1"
                                       min="1">

                                <button class="btn btn-success w-100">
                                    Agregar
                                </button>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>
        
        <div th:replace="fragments/footer :: footer"></div>

    </body>
</html>
