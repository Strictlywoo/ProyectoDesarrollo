<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Contacto | AlToque</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">

<style>

.contacto-section{
    background:#111;
    min-height:80vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
}

.contacto-container{
    max-width:700px;
}

.contacto-container h1{
    font-size:50px;
    margin-bottom:40px;
}

.contacto-info p{
    font-size:18px;
    margin:15px 0;
    color:#ccc;
}

.contacto-info a{
    color:#ffc107;
    text-decoration:none;
}

.contacto-info a:hover{
    text-decoration:underline;
}

.navbar{
    background:#0f0f0f;
}

.navbar a{
    color:white !important;
    margin-left:20px;
}

.navbar a:hover{
    color:#ffc107 !important;
}

.logo{
    font-size:26px;
    font-weight:bold;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg px-4">

<a class="navbar-brand logo" href="/">AlToque</a>

<div class="ms-auto">

<a href="/">Home</a>
<a href="/menu">Menú</a>

</div>

</nav>

<!-- CONTACTO -->

<section class="contacto-section">

<div class="contacto-container">

<h1>Información de contacto</h1>

<div class="contacto-info">

<p>📍 Costa Rica</p>

<p>🕒 Lunes a Sábado: 8:00 - 20:00</p>

<p> info@altoque.com</p>

<p> 6334-5424</p>

</div>

</div>

</section>

<!-- FOOTER -->

<div th:replace="fragments/footer :: footer"></div>
